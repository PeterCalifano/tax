name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / eigen-${{ matrix.eigen_version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        eigen_version: ["3.4.0", "5.0.0"]
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: gcc
            cc: gcc
            cxx: g++

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.2.x"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Linux compilers
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++
          else
            sudo apt-get install -y clang
          fi

      - name: Install Homebrew GCC
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: brew install gcc

      - name: Select Homebrew GCC binaries
        if: runner.os == 'macOS' && matrix.compiler == 'gcc'
        run: |
          GCC_BIN=$(ls -1 /opt/homebrew/bin/gcc-* /usr/local/bin/gcc-* 2>/dev/null | grep -E 'gcc-[0-9]+$' | sort -V | tail -n1)
          GXX_BIN="${GCC_BIN/gcc-/g++-}"
          echo "CC=$GCC_BIN" >> "$GITHUB_ENV"
          echo "CXX=$GXX_BIN" >> "$GITHUB_ENV"

      - name: Toolchain info
        run: |
          cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Install Eigen ${{ matrix.eigen_version }}
        run: |
          EIGEN_VERSION="${{ matrix.eigen_version }}"
          EIGEN_PREFIX="$HOME/.local"
          mkdir -p "$EIGEN_PREFIX"

          if [ "$EIGEN_VERSION" = "3.4.0" ]; then
            # Use the system package where available; fall back to source build
            if command -v apt-get &>/dev/null; then
              sudo apt-get install -y libeigen3-dev
              exit 0
            elif command -v brew &>/dev/null; then
              brew install eigen
              exit 0
            fi
          fi

          # Source install (used for Eigen 5 or as fallback).
          # Disable the BLAS / LAPACK subdirs: Eigen 5's install step
          # references compiled BLAS artifacts even when we never asked
          # for them, causing `cmake --install` to fail. tax only uses
          # Eigen as a header-only library.
          wget -q "https://gitlab.com/libeigen/eigen/-/archive/${EIGEN_VERSION}/eigen-${EIGEN_VERSION}.tar.gz"
          tar -xzf "eigen-${EIGEN_VERSION}.tar.gz"
          cmake -S "eigen-${EIGEN_VERSION}" -B eigen-build \
                -DCMAKE_INSTALL_PREFIX="$EIGEN_PREFIX" \
                -DCMAKE_BUILD_TYPE=Release \
                -DEIGEN_BUILD_DOC=OFF \
                -DEIGEN_BUILD_TESTING=OFF \
                -DEIGEN_BUILD_BLAS=OFF \
                -DEIGEN_BUILD_LAPACK=OFF
          cmake --install eigen-build
          echo "CMAKE_PREFIX_PATH=$EIGEN_PREFIX" >> "$GITHUB_ENV"

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DTAX_BUILD_UNITTESTS=ON
          -G Ninja

      - name: Build
        run: cmake --build build -j 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

  coverage:
    name: coverage (gcc / ubuntu / debug)
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "4.2.x"

      - name: Install coverage toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ gcovr libeigen3-dev ninja-build

      - name: Toolchain info
        run: |
          cmake --version
          "$CC" --version
          "$CXX" --version

      - name: Configure (coverage)
        run: >
          cmake -S . -B build-coverage
          -DCMAKE_BUILD_TYPE=Debug
          -DTAX_BUILD_UNITTESTS=ON
          -G Ninja
          -DCMAKE_CXX_FLAGS=--coverage
          -DCMAKE_EXE_LINKER_FLAGS=--coverage

      - name: Build (coverage)
        run: cmake --build build-coverage -j 2

      - name: Test (coverage)
        run: ctest --test-dir build-coverage --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr --root . build-coverage --filter "^include/tax/" --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --print-summary
          gcovr --root . build-coverage --filter "^include/tax/" --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --xml-pretty --output build-coverage/coverage.xml
          gcovr --root . build-coverage --filter "^include/tax/" --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --html-details --output build-coverage/coverage.html

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: andreapasquale94/tax
