site_name: tax
site_description: Header-only C++23 library for Truncated Algebraic eXpansions
site_url: https://andreapasquale94.github.io/tax/
repo_url: https://github.com/andreapasquale94/tax
repo_name: andreapasquale94/tax
edit_uri: edit/main/docs/

# Hide internal dev notes from the published site.
exclude_docs: |
  superpowers/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/andreapasquale94/tax
  generator: false

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - Guide:
      - guide/index.md
      - Variables & Expressions: guide/expressions.md
      - Extracting Results: guide/results.md
      - Dense vs Sparse Storage: guide/storage.md
      - Named Expansions: guide/named.md
      - Eigen Integration: guide/eigen.md
  - Reference:
      - reference/index.md
      - TaylorExpansion API: reference/core.md
      - Eigen API: reference/eigen.md
      - Named API: reference/named.md
  - Concepts:
      - concepts/index.md
      - Foundations & Ordering: concepts/foundations.md
      - Convergence & Truncation: concepts/convergence.md
  - Internals:
      - internals/index.md
      - Architecture: internals/architecture.md
      - Kernels & Recurrences: internals/kernels.md
      - Recurrence Relations: internals/recurrences.md
